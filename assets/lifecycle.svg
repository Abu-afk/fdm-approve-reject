<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 220" width="860" height="220">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="arrow"        markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#475569"/></marker>
    <marker id="arrow-green"  markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/></marker>
    <marker id="arrow-red"    markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#f87171"/></marker>
    <marker id="arrow-yellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#fbbf24"/></marker>
    <marker id="arrow-gray"   markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker>
    <style>
      /* Flowing dashes on arrows */
      .flow-gray   { stroke-dasharray: 6 5; animation: flowDash 1.2s linear infinite; }
      .flow-green  { stroke-dasharray: 6 5; animation: flowDash 1.0s linear infinite; }
      .flow-yellow { stroke-dasharray: 6 5; animation: flowDash 1.4s linear infinite; }
      .flow-red    { stroke-dasharray: 6 5; animation: flowDash 1.6s linear infinite; }
      .flow-gray-w { stroke-dasharray: 8 6; animation: flowDash 1.8s linear infinite; }
      @keyframes flowDash {
        from { stroke-dashoffset: 22; }
        to   { stroke-dashoffset: 0; }
      }

      /* Node border pulses */
      .pulse-gray   { animation: pulseGray   2.5s ease-in-out infinite; }
      .pulse-blue   { animation: pulseBlue   2.5s ease-in-out infinite; }
      .pulse-green  { animation: pulseGreen  2.5s ease-in-out infinite; }
      .pulse-paid   { animation: pulsePaid   1.8s ease-in-out infinite; }
      .pulse-yellow { animation: pulseYellow 2.5s ease-in-out infinite; }
      .pulse-red    { animation: pulseRed    2.5s ease-in-out infinite; }
      .pulse-purple { animation: pulsePurple 2.5s ease-in-out infinite; }

      @keyframes pulseGray   { 0%,100%{stroke:#475569;stroke-width:1.5} 50%{stroke:#64748b;stroke-width:2.5} }
      @keyframes pulseBlue   { 0%,100%{stroke:#3b82f6;stroke-width:1.5} 50%{stroke:#60a5fa;stroke-width:2.5} }
      @keyframes pulseGreen  { 0%,100%{stroke:#22c55e;stroke-width:1.5} 50%{stroke:#4ade80;stroke-width:2.5} }
      @keyframes pulsePaid   { 0%,100%{stroke:#4ade80;stroke-width:2;fill:#1a3d2b} 50%{stroke:#86efac;stroke-width:3;fill:#1f4d34} }
      @keyframes pulseYellow { 0%,100%{stroke:#fbbf24;stroke-width:1.5} 50%{stroke:#fde68a;stroke-width:2.5} }
      @keyframes pulseRed    { 0%,100%{stroke:#f87171;stroke-width:1.5} 50%{stroke:#fca5a5;stroke-width:2.5} }
      @keyframes pulsePurple { 0%,100%{stroke:#a855f7;stroke-width:1.5} 50%{stroke:#c084fc;stroke-width:2.5} }

      /* Moving dot along happy path */
      .dot-happy {
        animation: moveDotHappy 3s linear infinite;
        offset-path: path("M 110,91 L 336,91");
      }
      /* Label fade */
      .label { animation: labelPulse 3s ease-in-out infinite; }
      @keyframes labelPulse {
        0%,100% { opacity: 0.6; }
        50%      { opacity: 1; }
      }
      /* Title shimmer */
      .title { animation: titleShimmer 3s ease-in-out infinite; }
      @keyframes titleShimmer {
        0%,100% { fill: #94a3b8; }
        50%      { fill: #cbd5e1; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="220" rx="12" fill="url(#bg2)"/>

  <!-- Title -->
  <text class="title" x="30" y="34" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="1">CLAIM LIFECYCLE</text>

  <!-- ── Arrows (drawn behind nodes) ── -->

  <!-- DRAFT → SUBMITTED -->
  <line class="flow-gray" x1="110" y1="91" x2="171" y2="91" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SUBMITTED → APPROVED -->
  <line class="flow-green" x1="271" y1="91" x2="336" y2="91" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- APPROVED → PAID -->
  <line class="flow-green" x1="436" y1="91" x2="506" y2="91" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- SUBMITTED → CHANGES_REQUESTED -->
  <line class="flow-yellow" x1="223" y1="108" x2="223" y2="154" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-yellow)"/>

  <!-- CHANGES_REQUESTED → SUBMITTED (back) -->
  <path class="flow-yellow" d="M 245,154 Q 270,128 271,108" fill="none" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-yellow)"/>

  <!-- SUBMITTED → REJECTED -->
  <path class="flow-red" d="M 271,100 Q 310,148 336,175" fill="none" stroke="#f87171" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- withdraw arc -->
  <path class="flow-gray-w" d="M 223,74 Q 430,30 646,91" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- ── Nodes ── -->

  <!-- DRAFT -->
  <rect class="pulse-gray" x="30" y="74" width="80" height="34" rx="8" fill="#1e293b"/>
  <text x="70" y="96" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">DRAFT</text>

  <!-- SUBMITTED -->
  <rect class="pulse-blue" x="175" y="74" width="96" height="34" rx="8" fill="#1e3a5f"/>
  <text x="223" y="96" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">SUBMITTED</text>

  <!-- APPROVED -->
  <rect class="pulse-green" x="340" y="74" width="96" height="34" rx="8" fill="#1a3d2b"/>
  <text x="388" y="96" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#22c55e" text-anchor="middle">APPROVED</text>

  <!-- PAID -->
  <rect class="pulse-paid" x="510" y="74" width="80" height="34" rx="8"/>
  <text x="550" y="96" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="700" fill="#4ade80" text-anchor="middle">PAID</text>

  <!-- CHANGES_REQUESTED -->
  <rect class="pulse-yellow" x="162" y="158" width="122" height="34" rx="8" fill="#2d2a1e"/>
  <text x="223" y="180" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#fbbf24" text-anchor="middle">CHANGES REQUESTED</text>

  <!-- REJECTED -->
  <rect class="pulse-red" x="340" y="158" width="88" height="34" rx="8" fill="#3d1a1a"/>
  <text x="384" y="180" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#f87171" text-anchor="middle">REJECTED</text>

  <!-- WITHDRAWN -->
  <rect class="pulse-purple" x="650" y="74" width="96" height="34" rx="8" fill="#2d1e2d"/>
  <text x="698" y="96" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#a855f7" text-anchor="middle">WITHDRAWN</text>

  <!-- Withdraw label -->
  <text class="label" x="430" y="44" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">withdraw (pre-approval)</text>

  <!-- Travelling dots along happy path -->
  <circle r="4" fill="#22c55e" opacity="0.9">
    <animateMotion dur="2.5s" repeatCount="indefinite" rotate="auto">
      <mpath href="#happy-path"/>
    </animateMotion>
  </circle>
  <path id="happy-path" d="M 110,91 L 271,91 L 336,91 L 436,91 L 506,91" fill="none" stroke="none"/>

  <!-- Travelling dot on changes-requested loop -->
  <circle r="3" fill="#fbbf24" opacity="0.8">
    <animateMotion dur="3s" repeatCount="indefinite" rotate="auto">
      <mpath href="#changes-path"/>
    </animateMotion>
  </circle>
  <path id="changes-path" d="M 223,108 L 223,154 Q 270,128 271,108" fill="none" stroke="none"/>
</svg>
