<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 220" width="860" height="220">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f87171"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <style>
      /* Node fade-ins */
      .n1  { animation: popIn 0.4s 0.1s cubic-bezier(0.34,1.56,0.64,1) both; }
      .n2  { animation: popIn 0.4s 0.35s cubic-bezier(0.34,1.56,0.64,1) both; }
      .n3  { animation: popIn 0.4s 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
      .n4  { animation: popIn 0.4s 0.85s cubic-bezier(0.34,1.56,0.64,1) both; }
      .n5  { animation: popIn 0.4s 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
      .n6  { animation: popIn 0.4s 0.85s cubic-bezier(0.34,1.56,0.64,1) both; }
      .n7  { animation: popIn 0.4s 1.1s cubic-bezier(0.34,1.56,0.64,1) both; }
      @keyframes popIn {
        from { opacity: 0; transform: scale(0.7); }
        to   { opacity: 1; transform: scale(1); }
      }

      /* Arrow draw-on */
      .a1 { stroke-dasharray: 65;  stroke-dashoffset: 65;  animation: draw 0.4s 0.35s ease forwards; }
      .a2 { stroke-dasharray: 65;  stroke-dashoffset: 65;  animation: draw 0.4s 0.6s ease forwards; }
      .a3 { stroke-dasharray: 70;  stroke-dashoffset: 70;  animation: draw 0.4s 0.85s ease forwards; }
      .a4 { stroke-dasharray: 50;  stroke-dashoffset: 50;  animation: draw 0.4s 0.7s ease forwards; }
      .a5 { stroke-dasharray: 80;  stroke-dashoffset: 80;  animation: draw 0.4s 0.95s ease forwards; }
      .a6 { stroke-dasharray: 120; stroke-dashoffset: 120; animation: draw 0.5s 0.85s ease forwards; }
      .a7 { stroke-dasharray: 300; stroke-dashoffset: 300; animation: draw 0.7s 0.5s ease forwards; }
      @keyframes draw {
        to { stroke-dashoffset: 0; }
      }

      /* Title */
      .title { animation: fadeUp 0.5s 0s ease both; }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* PAID node pulses its border */
      .paid-border {
        animation: paidPulse 2s 1.5s ease-in-out infinite;
      }
      @keyframes paidPulse {
        0%, 100% { stroke-opacity: 1;  stroke-width: 2; }
        50%       { stroke-opacity: 0.4; stroke-width: 3; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="220" rx="12" fill="url(#bg2)"/>

  <!-- Title -->
  <text class="title" x="30" y="34" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" fill="#94a3b8" letter-spacing="1">CLAIM LIFECYCLE</text>

  <!-- ── Nodes ── -->

  <!-- DRAFT -->
  <g class="n1">
    <rect x="30" y="74" width="80" height="34" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <text x="70" y="96" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">DRAFT</text>
  </g>

  <!-- SUBMITTED -->
  <g class="n2">
    <rect x="175" y="74" width="96" height="34" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="223" y="96" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">SUBMITTED</text>
  </g>

  <!-- APPROVED -->
  <g class="n3">
    <rect x="340" y="74" width="96" height="34" rx="8" fill="#1a3d2b" stroke="#22c55e" stroke-width="1.5"/>
    <text x="388" y="96" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#22c55e" text-anchor="middle">APPROVED</text>
  </g>

  <!-- PAID -->
  <g class="n4">
    <rect x="510" y="74" width="80" height="34" rx="8" fill="#1a3d2b" stroke="#4ade80" stroke-width="2" class="paid-border"/>
    <text x="550" y="96" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="700" fill="#4ade80" text-anchor="middle">PAID</text>
  </g>

  <!-- CHANGES_REQUESTED -->
  <g class="n5">
    <rect x="162" y="158" width="122" height="34" rx="8" fill="#2d2a1e" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="223" y="180" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#fbbf24" text-anchor="middle">CHANGES REQUESTED</text>
  </g>

  <!-- REJECTED -->
  <g class="n6">
    <rect x="340" y="158" width="88" height="34" rx="8" fill="#3d1a1a" stroke="#f87171" stroke-width="1.5"/>
    <text x="384" y="180" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#f87171" text-anchor="middle">REJECTED</text>
  </g>

  <!-- WITHDRAWN -->
  <g class="n7">
    <rect x="650" y="74" width="96" height="34" rx="8" fill="#2d1e2d" stroke="#a855f7" stroke-width="1.5"/>
    <text x="698" y="96" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#a855f7" text-anchor="middle">WITHDRAWN</text>
  </g>

  <!-- ── Arrows ── -->

  <!-- DRAFT → SUBMITTED -->
  <line class="a1" x1="110" y1="91" x2="171" y2="91" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SUBMITTED → APPROVED -->
  <line class="a2" x1="271" y1="91" x2="336" y2="91" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- APPROVED → PAID -->
  <line class="a3" x1="436" y1="91" x2="506" y2="91" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- SUBMITTED → CHANGES_REQUESTED -->
  <line class="a4" x1="223" y1="108" x2="223" y2="154" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-yellow)"/>

  <!-- CHANGES_REQUESTED → SUBMITTED (dashed back) -->
  <path class="a5" d="M 245,154 Q 270,128 271,108" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-yellow)"/>

  <!-- SUBMITTED → REJECTED -->
  <path class="a6" d="M 271,100 Q 310,148 336,175" fill="none" stroke="#f87171" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- withdraw arc → WITHDRAWN -->
  <path class="a7" d="M 223,74 Q 430,30 646,91" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-gray)"/>
  <text x="430" y="44" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle" style="animation: fadeUp 0.5s 1.1s ease both; opacity:0;">withdraw (pre-approval)</text>
</svg>
