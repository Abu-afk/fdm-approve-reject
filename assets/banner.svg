<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 160" width="860" height="160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a">
        <animate attributeName="stop-color" values="#0f172a;#0d2137;#0f172a" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#1e293b">
        <animate attributeName="stop-color" values="#1e293b;#162032;#1e293b" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#22c55e" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#22c55e" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-860 0" to="860 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .receipt-group { animation: float 3s ease-in-out infinite; transform-origin: 58px 67px; }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-5px); }
      }
      .title-text { animation: glow-pulse 3s ease-in-out infinite; }
      @keyframes glow-pulse {
        0%, 100% { opacity: 1; filter: drop-shadow(0 0 0px #22c55e); }
        50%       { opacity: 0.92; filter: drop-shadow(0 0 6px #22c55e44); }
      }
      .badge-1 { animation: badgeFloat 3.0s 0.0s ease-in-out infinite; }
      .badge-2 { animation: badgeFloat 3.0s 0.4s ease-in-out infinite; }
      .badge-3 { animation: badgeFloat 3.0s 0.8s ease-in-out infinite; }
      .badge-4 { animation: badgeFloat 3.0s 1.2s ease-in-out infinite; }
      .badge-5 { animation: badgeFloat 3.0s 1.6s ease-in-out infinite; }
      @keyframes badgeFloat {
        0%, 100% { transform: translateY(0px);   opacity: 1; }
        50%       { transform: translateY(-3px);  opacity: 0.85; }
      }
      .accent-bar { animation: accentPulse 2s ease-in-out infinite; }
      @keyframes accentPulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.6; }
      }
      .dot { animation: dotMove 4s linear infinite; }
      @keyframes dotMove {
        0%   { transform: translateX(-10px); opacity: 0; }
        5%   { opacity: 1; }
        95%  { opacity: 1; }
        100% { transform: translateX(780px); opacity: 0; }
      }
      .subtitle { animation: subtitlePulse 4s ease-in-out infinite; }
      @keyframes subtitlePulse {
        0%, 100% { opacity: 0.7; }
        50%       { opacity: 1; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="160" rx="12" fill="url(#bg)"/>
  <rect width="860" height="160" rx="12" fill="url(#shimmer)"/>

  <!-- Moving dot across divider line -->
  <circle class="dot" cx="100" cy="114" r="2.5" fill="#22c55e" opacity="0.8"/>

  <!-- Green accent bar -->
  <rect class="accent-bar" x="0" y="0" width="5" height="160" rx="3" fill="url(#accent)"/>

  <!-- Receipt icon — floating -->
  <g class="receipt-group">
    <rect x="36" y="38" width="44" height="56" rx="4" fill="none" stroke="#22c55e" stroke-width="2"/>
    <rect x="42" y="52" width="32" height="2.5" rx="1.25" fill="#22c55e" opacity="0.7"/>
    <rect x="42" y="60" width="24" height="2.5" rx="1.25" fill="#22c55e" opacity="0.5"/>
    <rect x="42" y="68" width="28" height="2.5" rx="1.25" fill="#22c55e" opacity="0.5"/>
    <rect x="42" y="76" width="20" height="2.5" rx="1.25" fill="#22c55e" opacity="0.5"/>
    <circle cx="70" cy="82" r="9" fill="#22c55e">
      <animate attributeName="r" values="9;10;9" dur="2s" repeatCount="indefinite"/>
    </circle>
    <polyline points="65,82 69,86 75,78" fill="none" stroke="#0f172a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text class="title-text" x="100" y="72" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="700" fill="#f8fafc" letter-spacing="-0.5">FDM Expenses</text>

  <!-- Subtitle -->
  <text class="subtitle" x="101" y="100" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" fill="#94a3b8">Full-stack expense management · Submit · Review · Reimburse</text>

  <!-- Divider -->
  <line x1="100" y1="114" x2="760" y2="114" stroke="#334155" stroke-width="1"/>

  <!-- Badges -->
  <g class="badge-1">
    <rect x="100" y="125" width="82" height="22" rx="11" fill="#1e3a5f"/>
    <text x="141" y="140" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#60a5fa" text-anchor="middle">React 18 + TS</text>
  </g>
  <g class="badge-2">
    <rect x="190" y="125" width="100" height="22" rx="11" fill="#1a3d2b"/>
    <text x="240" y="140" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#22c55e" text-anchor="middle">Node + Express</text>
  </g>
  <g class="badge-3">
    <rect x="298" y="125" width="98" height="22" rx="11" fill="#2d2a1e"/>
    <text x="347" y="140" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#fbbf24" text-anchor="middle">Flat-file JSON</text>
  </g>
  <g class="badge-4">
    <rect x="404" y="125" width="68" height="22" rx="11" fill="#2d1e3a"/>
    <text x="438" y="140" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#c084fc" text-anchor="middle">JWT Auth</text>
  </g>
  <g class="badge-5">
    <rect x="480" y="125" width="82" height="22" rx="11" fill="#1e2d4a"/>
    <text x="521" y="140" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#38bdf8" text-anchor="middle">TypeScript</text>
  </g>
</svg>
