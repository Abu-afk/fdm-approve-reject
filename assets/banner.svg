<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 160" width="860" height="160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#22c55e;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-860 0" to="860 0" dur="2.8s" repeatCount="indefinite"/>
    </linearGradient>
    <style>
      .fade-in { animation: fadeIn 0.7s ease both; }
      .fade-in-1 { animation: fadeIn 0.7s 0.1s ease both; }
      .fade-in-2 { animation: fadeIn 0.7s 0.25s ease both; }
      .fade-in-3 { animation: fadeIn 0.7s 0.4s ease both; }
      .fade-in-4 { animation: fadeIn 0.7s 0.55s ease both; }
      .fade-in-5 { animation: fadeIn 0.7s 0.7s ease both; }
      .fade-in-6 { animation: fadeIn 0.7s 0.85s ease both; }
      .fade-in-7 { animation: fadeIn 0.7s 1.0s ease both; }
      .badge     { animation: fadeIn 0.5s ease both, badgePop 0.4s ease both; }
      .badge-1   { animation-delay: 0.9s; }
      .badge-2   { animation-delay: 1.05s; }
      .badge-3   { animation-delay: 1.2s; }
      .badge-4   { animation-delay: 1.35s; }
      .badge-5   { animation-delay: 1.5s; }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes badgePop {
        0%   { opacity: 0; transform: scale(0.85); }
        60%  { transform: scale(1.05); }
        100% { opacity: 1; transform: scale(1); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.5; }
      }
      .accent-bar { animation: accentGrow 0.6s cubic-bezier(0.22,1,0.36,1) both; }
      @keyframes accentGrow {
        from { transform: scaleY(0); transform-origin: top; }
        to   { transform: scaleY(1); transform-origin: top; }
      }
      .tick-circle { animation: tickPop 0.5s 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
      @keyframes tickPop {
        from { transform: scale(0); transform-origin: 34px 44px; }
        to   { transform: scale(1); transform-origin: 34px 44px; }
      }
      .tick-check {
        stroke-dasharray: 16;
        stroke-dashoffset: 16;
        animation: drawCheck 0.35s 0.85s ease forwards;
      }
      @keyframes drawCheck {
        to { stroke-dashoffset: 0; }
      }
      .divider {
        stroke-dasharray: 660;
        stroke-dashoffset: 660;
        animation: drawLine 0.6s 0.7s ease forwards;
      }
      @keyframes drawLine {
        to { stroke-dashoffset: 0; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="160" rx="12" fill="url(#bg)"/>
  <!-- Shimmer sweep -->
  <rect width="860" height="160" rx="12" fill="url(#shimmer)"/>

  <!-- Green accent bar -->
  <rect class="accent-bar" x="0" y="0" width="5" height="160" rx="3" fill="url(#accent)"/>

  <!-- Receipt icon -->
  <g transform="translate(36, 38)">
    <rect class="fade-in" x="0" y="0" width="44" height="56" rx="4" fill="none" stroke="#22c55e" stroke-width="2"/>
    <rect class="fade-in-1" x="6" y="14" width="32" height="2.5" rx="1.25" fill="#22c55e" opacity="0.7"/>
    <rect class="fade-in-2" x="6" y="22" width="24" height="2.5" rx="1.25" fill="#22c55e" opacity="0.5"/>
    <rect class="fade-in-3" x="6" y="30" width="28" height="2.5" rx="1.25" fill="#22c55e" opacity="0.5"/>
    <rect class="fade-in-4" x="6" y="38" width="20" height="2.5" rx="1.25" fill="#22c55e" opacity="0.5"/>
    <circle class="tick-circle" cx="34" cy="44" r="9" fill="#22c55e"/>
    <polyline class="tick-check" points="29,44 33,48 39,40" fill="none" stroke="#0f172a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text class="fade-in-2" x="100" y="72" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="700" fill="#f8fafc" letter-spacing="-0.5">FDM Expenses</text>

  <!-- Subtitle -->
  <text class="fade-in-3" x="101" y="100" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" fill="#94a3b8">Full-stack expense management · Submit · Review · Reimburse</text>

  <!-- Divider -->
  <line class="divider" x1="100" y1="114" x2="760" y2="114" stroke="#334155" stroke-width="1"/>

  <!-- Badges -->
  <g class="badge badge-1">
    <rect x="100" y="125" width="82" height="22" rx="11" fill="#1e3a5f"/>
    <text x="141" y="140" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#60a5fa" text-anchor="middle">React 18 + TS</text>
  </g>
  <g class="badge badge-2">
    <rect x="190" y="125" width="100" height="22" rx="11" fill="#1a3d2b"/>
    <text x="240" y="140" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#22c55e" text-anchor="middle">Node + Express</text>
  </g>
  <g class="badge badge-3">
    <rect x="298" y="125" width="98" height="22" rx="11" fill="#2d2a1e"/>
    <text x="347" y="140" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#fbbf24" text-anchor="middle">Flat-file JSON</text>
  </g>
  <g class="badge badge-4">
    <rect x="404" y="125" width="68" height="22" rx="11" fill="#2d1e3a"/>
    <text x="438" y="140" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#c084fc" text-anchor="middle">JWT Auth</text>
  </g>
  <g class="badge badge-5">
    <rect x="480" y="125" width="82" height="22" rx="11" fill="#1e2d4a"/>
    <text x="521" y="140" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#38bdf8" text-anchor="middle">TypeScript</text>
  </g>
</svg>
